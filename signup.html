<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | PetroFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
    .auth-container { max-width:480px; width:100%; padding:20px; }
    .auth-card { background:#fff; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,.2); padding:40px; }
    .form-control,.form-select { border-radius:10px; padding:11px 14px; border:2px solid #e0e0e0; }
    .form-control:focus,.form-select:focus { border-color:#667eea; box-shadow:0 0 0 .2rem rgba(102,126,234,.2); }
    .btn-auth { background:linear-gradient(135deg,#667eea,#764ba2); border:none; border-radius:10px; padding:12px; font-weight:600; color:#fff; width:100%; }
    .btn-auth:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(102,126,234,.4); color:#fff; }
    .link-text { color:#667eea; text-decoration:none; font-weight:600; }
    .role-info { background:#f8f9ff; border:1px solid #e0e7ff; border-radius:10px; padding:12px; font-size:13px; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <img src="assets/logo.jfif" alt="Logo" style="width:68px;height:68px;border-radius:50%;object-fit:cover;margin-bottom:12px"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2268%22 height=%2268%22><rect fill=%22%23667eea%22 width=%2268%22 height=%2268%22/><text x=%2250%%22 y=%2257%%22 font-size=%2234%22 fill=%22white%22 text-anchor=%22middle%22>P</text></svg>'">
      <h4 style="color:#333;font-weight:700;margin:0">Create Account</h4>
      <p class="text-muted small mt-1">PetroFlow Management System</p>
    </div>
    <div id="alert-container"></div>
    <form id="signupForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="e.g. Muhammad Ali" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Requesting Role</label>
        <select class="form-select" id="requestedRole" onchange="updateRoleInfo()">
          <option value="employee">Employee — Basic data entry</option>
          <option value="manager">Manager — Full operations access</option>
          <option value="admin">Admin — User management + settings</option>
        </select>
        <div class="role-info mt-2" id="role-info-box">
          <i class="bi bi-info-circle me-1 text-primary"></i>
          <span id="role-info-text">Basic access: daily readings and transactions entry.</span>
        </div>
      </div>
      <button type="submit" class="btn btn-auth" id="signupBtn">
        <i class="bi bi-person-plus me-2"></i>Request Account
      </button>
    </form>
    <hr class="my-4">
    <div class="text-center small">
      Already have an account? <a href="login.html" class="link-text">Sign In</a>
    </div>
  </div>
  <div class="text-center mt-3"><small class="text-white opacity-75">© 2026 PetroFlow</small></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
  const roleDesc = {
    employee: 'Basic access: daily readings and transactions entry.',
    manager:  'Full operations: customers, cash deposits, reports.',
    admin:    'Manage users (managers/employees), edit prices, full reports.'
  };
  function updateRoleInfo() {
    const r = document.getElementById('requestedRole').value;
    document.getElementById('role-info-text').textContent = roleDesc[r] || '';
  }
  function waitForSB(cb, n=0) { if (window.supabaseClient) return cb(); if(n>60) return; setTimeout(()=>waitForSB(cb,n+1),100); }
  window.addEventListener('DOMContentLoaded', () => waitForSB(() => {
    document.getElementById('signupForm').addEventListener('submit', handleSignup);
  }));

  async function handleSignup(e) {
    e.preventDefault();
    const fullName = document.getElementById('fullName').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const role     = document.getElementById('requestedRole').value;
    const btn      = document.getElementById('signupBtn');

    if (password !== confirm) { showAlert('Passwords do not match.', 'danger'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
    try {
      const { data, error } = await window.supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      const userId = data.user?.id;
      if (!userId) throw new Error('Signup failed – please try again.');

      const { error: profErr } = await window.supabaseClient.from('user_profiles').insert({
        user_id: userId, email, full_name: fullName, role,
        status: 'pending', created_at: new Date().toISOString()
      });
      if (profErr) throw profErr;

      await window.supabaseClient.auth.signOut();
      showAlert(`✅ Account request sent! You requested <strong>${role}</strong> access. An administrator will approve your account. Please check back or contact your pump admin.`, 'success');
      btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Request Sent';
    } catch (err) {
      showAlert(err.message || 'Signup failed. Please try again.', 'danger');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Request Account';
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alert-container').innerHTML =
      `<div class="alert alert-${type} fade show">${msg}</div>`;
  }
</script>
</body>
</html>
