<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Machine Cash Sales - Petrol Pump System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<link href="css/style.css" rel="stylesheet">

</head>


<body data-page="machine-cash-sales">


<!-- Navbar -->
<div id="navbar-placeholder"></div>


<!-- Page Content -->
<div class="container-fluid mt-4">


<div class="row justify-content-center">


<div class="col-lg-6">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h5 class="mb-0">

<i class="bi bi-cash-coin"></i>

Machine Cash Sale Entry

</h5>

</div>


<div class="card-body">


<form id="machineSaleForm">


<!-- Fuel Type -->
<div class="mb-3">

<label class="form-label">Fuel Type</label>

<select id="machine-fuel-type"

class="form-select"

required>

<option value="">Select Fuel</option>

<option value="Petrol">Petrol</option>

<option value="Diesel">Diesel</option>

</select>

</div>


<!-- Liters -->
<div class="mb-3">

<label class="form-label">Liters</label>

<input type="number"

id="machine-liters"

class="form-control"

step="0.01"

required>

</div>


<!-- Unit Price -->
<div class="mb-3">

<label class="form-label">Rate per Liter</label>

<input type="number"

id="machine-unit-price"

class="form-control"

step="0.01"

required>

</div>


<!-- Amount -->
<div class="mb-3">

<label class="form-label">Amount</label>

<input type="number"

id="machine-amount"

class="form-control"

step="0.01"

required>

</div>


<!-- Description -->
<div class="mb-3">

<label class="form-label">Description</label>

<textarea id="machine-description"

class="form-control"

rows="2"

placeholder="Optional"></textarea>

</div>


<button type="button"

class="btn btn-success w-100"

onclick="addMachineCashSale()">

<i class="bi bi-save"></i>

Save Cash Sale

</button>


</form>

</div>

</div>

</div>

</div>

</div>


<!-- Footer -->
<div id="footer-placeholder"></div>


<!-- Scripts -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script src="js/supabase-client.js"></script>

<script src="js/app.js"></script>


<script>


// Machine Cash Sale Function

async function addMachineCashSale(){


const sb = window.supabaseClient;


if(!sb){

showToast("Database not connected","error");

return;

}


const fuelType = document.getElementById("machine-fuel-type").value;

const liters = parseFloat(document.getElementById("machine-liters").value);

const unitPrice = parseFloat(document.getElementById("machine-unit-price").value);

const amount = parseFloat(document.getElementById("machine-amount").value);

const description = document.getElementById("machine-description").value || "Machine Cash Sale";



if(!fuelType || !liters || !unitPrice || !amount){

showToast("Please fill all fields","error");

return;

}


// find tank

const tank = tanksCache.find(t=>t.fuel_type===fuelType);

if(!tank){

showToast("Tank not found","error");

return;

}


// stock check

if(tank.current_stock < liters){

showToast("Not enough stock","error");

return;

}


try{


// insert transaction

const {error:transError} = await sb

.from("transactions")

.insert([{

customer_id:null,

tank_id:tank.id,

transaction_type:"Credit",

amount:amount,

liters:liters,

unit_price:unitPrice,

description:description

}]);


if(transError) throw transError;


// update tank stock

const {error:tankError} = await sb

.from("tanks")

.update({

current_stock:tank.current_stock - liters,

last_updated:new Date().toISOString()

})

.eq("id",tank.id);


if(tankError) throw tankError;


showToast("Machine Cash Sale Saved","success");


document.getElementById("machineSaleForm").reset();

await loadTanks();

await loadTransactions();


}

catch(err){

showToast(err.message,"error");

}

}


</script>


</body>

</html>
