<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | PetroFlow</title>
  <link rel="icon" type="image/png" href="/assets/logo.jfif">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="bg-light">
  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="max-width:430px;width:100%;border-radius:16px;">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1">Set New Password</h4>
        <p class="text-muted small mb-4">Enter your new password below.</p>
        <div id="reset-alert" class="alert d-none"></div>
        <form id="resetForm">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" id="new-password" class="form-control" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" minlength="6" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Update Password</button>
        </form>
        <div class="text-center mt-3"><a href="/login.html" class="small">Back to Login</a></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script>
    const alertBox = document.getElementById('reset-alert');
    function show(type, msg) {
      alertBox.className = 'alert alert-' + type;
      alertBox.textContent = msg;
    }
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      if (p1 !== p2) return show('danger', 'Passwords do not match.');
      if (p1.length < 6) return show('danger', 'Password must be at least 6 characters.');
      try {
        const { error } = await window.supabaseClient.auth.updateUser({ password: p1 });
        if (error) throw error;
        show('success', 'Password updated successfully. You can login now.');
        setTimeout(() => location.href = '/login.html', 1200);
      } catch (err) {
        show('danger', err.message || 'Password reset failed. Open the reset link again.');
      }
    });
  </script>
</body>
</html>
