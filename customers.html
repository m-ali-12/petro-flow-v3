<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers | Khalid &amp; Sons Petroleum</title>
<link rel="icon" type="image/jfif" href="assets/logo.jfif">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet">
</head>
<body data-page="customers">
<div id="navbar-placeholder"></div>

<div class="container-fluid py-4 px-4">

  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-1"><i class="bi bi-people-fill me-2 text-primary"></i>Customers</h4>
      <p class="text-muted mb-0 small">Manage all customers, udhaar accounts and balances</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
      <i class="bi bi-person-plus-fill me-1"></i> Add Customer
    </button>
  </div>

  <!-- Summary Cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card shadow-sm border-0 h-100" style="border-left:4px solid #0d6efd !important;">
        <div class="card-body text-center py-3">
          <i class="bi bi-people text-primary" style="font-size:1.8rem;"></i>
          <h5 class="mt-2 mb-0 fw-bold" id="total-customers">0</h5>
          <small class="text-muted">Total Customers</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body text-center py-3">
          <i class="bi bi-cash-stack text-danger" style="font-size:1.8rem;"></i>
          <h5 class="mt-2 mb-0 fw-bold text-danger" id="total-udhaar">Rs. 0</h5>
          <small class="text-muted">Total Udhaar</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body text-center py-3">
          <i class="bi bi-wallet2 text-success" style="font-size:1.8rem;"></i>
          <h5 class="mt-2 mb-0 fw-bold text-success" id="total-advance">Rs. 0</h5>
          <small class="text-muted">Total Advance</small>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body text-center py-3">
          <i class="bi bi-building text-info" style="font-size:1.8rem;"></i>
          <h5 class="mt-2 mb-0 fw-bold text-info" id="total-companies">0</h5>
          <small class="text-muted">Companies</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-3">
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label small fw-bold">Search Customer</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="search-input" class="form-control" placeholder="Name or SR No...">
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Category</label>
          <select id="filter-category" class="form-select">
            <option value="">All Categories</option>
            <option value="Regular">Regular</option>
            <option value="Member">Member</option>
            <option value="Company">Company</option>
            <option value="Owner">Owner</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small fw-bold">Per Page</label>
          <select id="page-size-select" class="form-select">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="all">All</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" id="clear-filters">
            <i class="bi bi-x-circle me-1"></i>Clear
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h6 class="mb-0"><i class="bi bi-table me-2"></i>Customer List</h6>
      <span class="badge bg-primary" id="pagination-info">Loading...</span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-sm mb-0">
          <thead style="background:#1a3a5c;color:#fff;">
            <tr>
              <th style="padding:10px 12px;">SR #</th>
              <th style="padding:10px 12px;">Name</th>
              <th style="padding:10px 12px;">Phone</th>
              <th style="padding:10px 12px;">Category</th>
              <th style="padding:10px 12px;">Balance</th>
              <th style="padding:10px 12px;width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody id="customers-table">
            <tr><td colspan="6" class="text-center py-4 text-muted">
              <div class="spinner-border spinner-border-sm text-primary me-2"></div>Loading...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center flex-wrap gap-2 py-2">
      <small class="text-muted" id="pagination-info-bottom"></small>
      <div class="d-flex gap-1 flex-wrap" id="pagination-buttons"></div>
    </div>
  </div>

</div><!-- /container -->

<!-- ADD CUSTOMER MODAL -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="addCustomerForm">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="bi bi-person-plus-fill me-2"></i>Add Customer</h5>
          <button class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">SR No *</label>
              <input type="number" id="customer-sr-no" class="form-control" required min="1">
            </div>
            <div class="col-md-8">
              <label class="form-label">Name *</label>
              <input type="text" id="customer-name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" id="customer-phone" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">Category *</label>
              <select id="customer-category" class="form-select" required>
                <option value="Regular">Regular</option>
                <option value="Member">Member</option>
                <option value="Company">Company</option>
                <option value="Owner">Owner</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Opening Balance (Rs.)</label>
              <input type="number" id="customer-balance" class="form-control" value="0" step="0.01">
              <small class="text-muted">Positive = Udhaar, Negative = Advance</small>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Save Customer</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- EDIT CUSTOMER MODAL -->
<div class="modal fade" id="editCustomerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="editCustomerForm">
        <div class="modal-header bg-warning">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Customer</h5>
          <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-customer-id">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">SR No *</label>
              <input type="number" id="edit-sr-no" class="form-control" required>
            </div>
            <div class="col-md-8">
              <label class="form-label">Name *</label>
              <input type="text" id="edit-name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" id="edit-phone" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">Category *</label>
              <select id="edit-category" class="form-select" required>
                <option value="Regular">Regular</option>
                <option value="Member">Member</option>
                <option value="Company">Company</option>
                <option value="Owner">Owner</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Balance (Rs.)</label>
              <input type="number" id="edit-balance" class="form-control" step="0.01">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-warning"><i class="bi bi-check-circle me-1"></i>Update</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div class="toast" id="liveToast" role="alert">
    <div class="toast-header">
      <strong class="me-auto" id="toast-title">Info</strong>
      <button class="btn-close" data-bs-dismiss="toast" type="button"></button>
    </div>
    <div class="toast-body" id="toast-message">...</div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/customers-page.js"></script>
</body>
</html>
